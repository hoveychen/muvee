# Server-only deployment: control plane without agents.
# Use this when worker agents run on separate machines.
#
# Usage:
#   cp .env.server.example .env   # then edit .env
#   # Generate registry credentials (run once):
#   docker run --entrypoint htpasswd httpd:2 -Bbn <user> <password> > registry/htpasswd
#   docker compose -f docker-compose.server.yml up -d
#
# Then register worker nodes by following the agent setup guide in README.md.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: muvee
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-muvee}
      POSTGRES_DB: muvee
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - muvee-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U muvee"]
      interval: 5s
      timeout: 5s
      retries: 5

  registry:
    image: registry:2
    environment:
      REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: /data
      REGISTRY_AUTH: htpasswd
      REGISTRY_AUTH_HTPASSWD_REALM: "Muvee Registry"
      REGISTRY_AUTH_HTPASSWD_PATH: /auth/htpasswd
    volumes:
      - registry_data:/data
      - ./registry/htpasswd:/auth/htpasswd:ro
    networks:
      - muvee-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.registry.rule=Host(`registry.${BASE_DOMAIN}`)"
      - "traefik.http.routers.registry.entrypoints=websecure"
      - "traefik.http.routers.registry.tls.certresolver=letsencrypt"
      - "traefik.http.services.registry.loadbalancer.server.port=5000"

  # ── Control-plane server (API + embedded React UI) ─────────────────────────
  muvee-server:
    image: ghcr.io/hoveychen/muvee:latest
    # For local/offline builds:
    #   build: { context: ., dockerfile: Dockerfile.local }
    command: ["server"]
    environment:
      DATABASE_URL: postgres://muvee:${POSTGRES_PASSWORD:-muvee}@postgres:5432/muvee?sslmode=disable
      MIGRATIONS_DIR: /app/db/migrations
      # Google OAuth (set GOOGLE_CLIENT_ID to enable)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URL: https://${BASE_DOMAIN}/auth/google/callback
      # Feishu / Lark OAuth (set FEISHU_APP_ID to enable)
      FEISHU_APP_ID: ${FEISHU_APP_ID}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET}
      FEISHU_BASE_URL: ${FEISHU_BASE_URL}
      FEISHU_REDIRECT_URL: https://${BASE_DOMAIN}/auth/feishu/callback
      # WeCom (企业微信) OAuth (set WECOM_CORP_ID to enable)
      WECOM_CORP_ID: ${WECOM_CORP_ID}
      WECOM_CORP_SECRET: ${WECOM_CORP_SECRET}
      WECOM_AGENT_ID: ${WECOM_AGENT_ID}
      WECOM_REDIRECT_URL: https://${BASE_DOMAIN}/auth/wecom/callback
      # DingTalk (钉钉) OAuth (set DINGTALK_CLIENT_ID to enable)
      DINGTALK_CLIENT_ID: ${DINGTALK_CLIENT_ID}
      DINGTALK_CLIENT_SECRET: ${DINGTALK_CLIENT_SECRET}
      DINGTALK_REDIRECT_URL: https://${BASE_DOMAIN}/auth/dingtalk/callback
      ALLOWED_DOMAINS: ${ALLOWED_DOMAINS}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      JWT_SECRET: ${JWT_SECRET}
      BASE_DOMAIN: ${BASE_DOMAIN}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://muvee-authservice:4181}
      AGENT_SECRET: ${AGENT_SECRET}
      REGISTRY_ADDR: ${REGISTRY_ADDR}
      REGISTRY_USER: ${REGISTRY_USER}
      REGISTRY_PASSWORD: ${REGISTRY_PASSWORD}
      PORT: "8080"
      # Workspace volume: set VOLUME_NFS_BASE_PATH in .env to enable per-project persistent storage.
      # The NFS share must be mounted at this path on the control-plane host BEFORE starting Compose,
      # and at the same absolute path on every deploy-agent node.
      VOLUME_NFS_BASE_PATH: ${VOLUME_NFS_BASE_PATH}
      # Dataset NFS base path:
      # Dataset nfs_path values are relative sub-paths under this base.
      DATASET_NFS_BASE_PATH: ${DATASET_NFS_BASE_PATH}
    volumes:
      - ./db/migrations:/app/db/migrations:ro
      # Uncomment the line below (and set VOLUME_NFS_BASE_PATH in .env) to enable workspace file management.
      # The NFS share must already be mounted on this host at that path.
      # - ${VOLUME_NFS_BASE_PATH}:${VOLUME_NFS_BASE_PATH}:rw
      # Uncomment to enable dataset monitor access (server scans dataset files directly).
      # The NFS share must already be mounted on this host at DATASET_NFS_BASE_PATH.
      # - ${DATASET_NFS_BASE_PATH}:${DATASET_NFS_BASE_PATH}:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - muvee-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.muvee.rule=Host(`${BASE_DOMAIN}`)"
      - "traefik.http.routers.muvee.entrypoints=websecure"
      - "traefik.http.routers.muvee.tls.certresolver=letsencrypt"
      - "traefik.http.services.muvee.loadbalancer.server.port=8080"

  # ── Traefik ForwardAuth sidecar ────────────────────────────────────────────
  muvee-authservice:
    image: ghcr.io/hoveychen/muvee:latest
    command: ["authservice"]
    environment:
      # Google OAuth (set GOOGLE_CLIENT_ID to enable)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      # Feishu / Lark OAuth (set FEISHU_APP_ID to enable)
      FEISHU_APP_ID: ${FEISHU_APP_ID}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET}
      FEISHU_BASE_URL: ${FEISHU_BASE_URL}
      # WeCom (企业微信) OAuth (set WECOM_CORP_ID to enable)
      WECOM_CORP_ID: ${WECOM_CORP_ID}
      WECOM_CORP_SECRET: ${WECOM_CORP_SECRET}
      WECOM_AGENT_ID: ${WECOM_AGENT_ID}
      # DingTalk (钉钉) OAuth (set DINGTALK_CLIENT_ID to enable)
      DINGTALK_CLIENT_ID: ${DINGTALK_CLIENT_ID}
      DINGTALK_CLIENT_SECRET: ${DINGTALK_CLIENT_SECRET}
      # Base URL used to build per-provider callback URLs: {FORWARD_AUTH_BASE_URL}/_oauth/{provider}
      FORWARD_AUTH_BASE_URL: https://${BASE_DOMAIN}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      BASE_DOMAIN: ${BASE_DOMAIN}
      PORT: "4181"
    networks:
      - muvee-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.muvee-authservice.rule=Host(`${BASE_DOMAIN}`) && PathPrefix(`/_oauth`)"
      - "traefik.http.routers.muvee-authservice.entrypoints=websecure"
      - "traefik.http.routers.muvee-authservice.tls.certresolver=letsencrypt"
      - "traefik.http.services.muvee-authservice.loadbalancer.server.port=4181"

  traefik:
    image: traefik:v3.6.1
    command:
      - "--configFile=/etc/traefik/traefik.yml"
      - "--certificatesResolvers.letsencrypt.acme.email=${ACME_EMAIL}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - letsencrypt_data:/letsencrypt
    environment:
      ACME_EMAIL: ${ACME_EMAIL}
      BASE_DOMAIN: ${BASE_DOMAIN}
    networks:
      - muvee-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${BASE_DOMAIN}`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=muvee-forward-auth-admin@file"

volumes:
  postgres_data:
  registry_data:
  letsencrypt_data:

networks:
  # explicit `name` prevents Docker Compose from prepending the project prefix (muvee_muvee-net),
  # keeping it as `muvee-net` to match the Traefik provider config in traefik/traefik.yml.
  muvee-net:
    driver: bridge
    name: muvee-net
