# Agent-only deployment: builder node.
#
# Usage:
#   cp .env.agent.example .env   # then edit .env
#   # Proxy (required — create empty if no proxy needed, or copy template to configure):
#   touch .proxy.env                          # no proxy
#   cp .proxy.env.example .proxy.env          # with proxy — then edit .proxy.env
#   docker-compose -f docker-compose.agent-builder.yml up -d

services:
  muvee-agent-builder:
    image: ghcr.io/hoveychen/muvee:latest
    command: ["agent"]
    restart: unless-stopped
    hostname: muvee-agent-builder
    env_file:
      - .proxy.env
    environment:
      NODE_ROLE: builder
      CONTROL_PLANE_URL: ${CONTROL_PLANE_URL}
      AGENT_SECRET: ${AGENT_SECRET}
      # NODE_NAME pins the agent's identity across restarts/upgrades.
      # Override in .env if you run multiple builder agents on different hosts.
      NODE_NAME: ${NODE_NAME:-muvee-agent-builder}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ── Watchtower — auto-pulls new ghcr.io/hoveychen/muvee:latest and restarts ─
  # Only watches containers labeled `com.centurylinklabs.watchtower.enable=true`.
  # Opt-in via the `auto-update` Compose profile: set COMPOSE_PROFILES=auto-update
  # in your .env (or `docker compose --profile auto-update up -d`).
  watchtower:
    image: nickfedor/watchtower:latest
    profiles: ["auto-update"]
    restart: unless-stopped
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_POLL_INTERVAL: "60"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_INCLUDE_RESTARTING: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
