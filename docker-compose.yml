# Default (standalone) deployment: all components on a single machine.
# Starts: postgres, registry, muvee-server, muvee-authservice, traefik,
#         muvee-agent-builder, and muvee-agent-deploy.
#
# Usage:
#   cp .env.example .env   # then edit .env
#   # Generate registry credentials (run once):
#   docker run --entrypoint htpasswd httpd:2 -Bbn <user> <password> > registry/htpasswd
#   docker compose up -d
#
# For multi-node deployments (agents on separate machines), use:
#   docker compose -f docker-compose.server.yml up -d
# then follow the agent setup guide in README.md.
#
# NOTE: The deploy agent mounts the host Docker socket so it can start
# deployed-app containers on this machine. Those containers are attached to
# muvee-net, which Traefik (also on muvee-net) uses to route traffic.
# HOST_IP is auto-detected via a UDP probe toward muvee-server; override it
# with HOST_IP=<ip> in .env if Traefik picks the wrong interface.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: muvee
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-muvee}
      POSTGRES_DB: muvee
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - muvee-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U muvee"]
      interval: 5s
      timeout: 5s
      retries: 5

  registry:
    image: registry:2
    environment:
      REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: /data
      REGISTRY_AUTH: htpasswd
      REGISTRY_AUTH_HTPASSWD_REALM: "Muvee Registry"
      REGISTRY_AUTH_HTPASSWD_PATH: /auth/htpasswd
    volumes:
      - registry_data:/data
      - ./registry/htpasswd:/auth/htpasswd:ro
    networks:
      - muvee-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.registry.rule=Host(`registry.${BASE_DOMAIN}`)"
      - "traefik.http.routers.registry.entrypoints=websecure"
      - "traefik.http.routers.registry.tls.certresolver=letsencrypt"
      # Declaring the domain up-front makes Traefik pre-fetch the ACME cert on
      # startup instead of lazily on the first HTTPS request.
      - "traefik.http.routers.registry.tls.domains[0].main=registry.${BASE_DOMAIN}"
      - "traefik.http.services.registry.loadbalancer.server.port=5000"

  # ── Control-plane server (API + embedded React UI) ─────────────────────────
  muvee-server:
    image: ghcr.io/hoveychen/muvee:latest
    # For local/offline builds:
    #   build: { context: ., dockerfile: Dockerfile.local }
    command: ["server"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/auth/providers || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    environment:
      DATABASE_URL: postgres://muvee:${POSTGRES_PASSWORD:-muvee}@postgres:5432/muvee?sslmode=disable
      MIGRATIONS_DIR: /app/db/migrations
      # Google OAuth (set GOOGLE_CLIENT_ID to enable)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URL: https://${BASE_DOMAIN}/auth/google/callback
      # Feishu / Lark OAuth (set FEISHU_APP_ID to enable)
      FEISHU_APP_ID: ${FEISHU_APP_ID}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET}
      FEISHU_BASE_URL: ${FEISHU_BASE_URL}
      FEISHU_REDIRECT_URL: https://${BASE_DOMAIN}/auth/feishu/callback
      # WeCom (企业微信) OAuth (set WECOM_CORP_ID to enable)
      WECOM_CORP_ID: ${WECOM_CORP_ID}
      WECOM_CORP_SECRET: ${WECOM_CORP_SECRET}
      WECOM_AGENT_ID: ${WECOM_AGENT_ID}
      WECOM_REDIRECT_URL: https://${BASE_DOMAIN}/auth/wecom/callback
      # DingTalk (钉钉) OAuth (set DINGTALK_CLIENT_ID to enable)
      DINGTALK_CLIENT_ID: ${DINGTALK_CLIENT_ID}
      DINGTALK_CLIENT_SECRET: ${DINGTALK_CLIENT_SECRET}
      DINGTALK_REDIRECT_URL: https://${BASE_DOMAIN}/auth/dingtalk/callback
      ALLOWED_DOMAINS: ${ALLOWED_DOMAINS}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      JWT_SECRET: ${JWT_SECRET}
      SECRET_ENCRYPTION_KEY: ${SECRET_ENCRYPTION_KEY}
      BASE_DOMAIN: ${BASE_DOMAIN}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://muvee-authservice:4181}
      AGENT_SECRET: ${AGENT_SECRET}
      REGISTRY_ADDR: ${REGISTRY_ADDR}
      REGISTRY_USER: ${REGISTRY_USER}
      REGISTRY_PASSWORD: ${REGISTRY_PASSWORD}
      PORT: "8080"
      # Workspace volume: bind-mount the same local path into the server container so the
      # file-management API can read/write workspace files directly on the host filesystem.
      # Falls back to /opt/muvee/volumes when not set in .env.
      VOLUME_NFS_BASE_PATH: ${VOLUME_NFS_BASE_PATH:-/opt/muvee/volumes}
      # Dataset NFS base path: datasets use relative sub-paths under this base
      # (e.g. "warehouse" -> /opt/muvee/datasets/warehouse in standalone mode).
      DATASET_NFS_BASE_PATH: ${DATASET_NFS_BASE_PATH:-/opt/muvee/datasets}
      # Git repository base path: self-hosted bare repos for projects.
      GIT_REPO_BASE_PATH: ${GIT_REPO_BASE_PATH:-/opt/muvee/git-repos}
      # Tunnel backend URL: how Traefik reaches this server for adhoc tunnel traffic.
      TUNNEL_BACKEND_URL: ${TUNNEL_BACKEND_URL:-http://muvee-server:8080}
      # Path (inside the container) of the Traefik JSON access log tailed for per-project traffic metrics.
      TRAEFIK_ACCESS_LOG_PATH: /var/log/traefik/access.log
    volumes:
      - ./db/migrations:/app/db/migrations:ro
      - ${VOLUME_NFS_BASE_PATH:-/opt/muvee/volumes}:${VOLUME_NFS_BASE_PATH:-/opt/muvee/volumes}:rw
      - ${DATASET_NFS_BASE_PATH:-/opt/muvee/datasets}:${DATASET_NFS_BASE_PATH:-/opt/muvee/datasets}:rw
      - ${GIT_REPO_BASE_PATH:-/opt/muvee/git-repos}:${GIT_REPO_BASE_PATH:-/opt/muvee/git-repos}:rw
      - traefik_logs:/var/log/traefik:ro
      # Read-only view of Traefik's ACME store so the admin "Certificates"
      # panel can report per-domain issuance state.
      - letsencrypt_data:/letsencrypt:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - muvee-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.muvee.rule=Host(`${BASE_DOMAIN}`)"
      - "traefik.http.routers.muvee.entrypoints=websecure"
      - "traefik.http.routers.muvee.tls.certresolver=letsencrypt"
      - "traefik.http.routers.muvee.tls.domains[0].main=${BASE_DOMAIN}"
      - "traefik.http.services.muvee.loadbalancer.server.port=8080"

  # ── Traefik ForwardAuth sidecar ────────────────────────────────────────────
  muvee-authservice:
    image: ghcr.io/hoveychen/muvee:latest
    command: ["authservice"]
    environment:
      # Google OAuth (set GOOGLE_CLIENT_ID to enable)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      # Feishu / Lark OAuth (set FEISHU_APP_ID to enable)
      FEISHU_APP_ID: ${FEISHU_APP_ID}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET}
      FEISHU_BASE_URL: ${FEISHU_BASE_URL}
      # WeCom (企业微信) OAuth (set WECOM_CORP_ID to enable)
      WECOM_CORP_ID: ${WECOM_CORP_ID}
      WECOM_CORP_SECRET: ${WECOM_CORP_SECRET}
      WECOM_AGENT_ID: ${WECOM_AGENT_ID}
      # DingTalk (钉钉) OAuth (set DINGTALK_CLIENT_ID to enable)
      DINGTALK_CLIENT_ID: ${DINGTALK_CLIENT_ID}
      DINGTALK_CLIENT_SECRET: ${DINGTALK_CLIENT_SECRET}
      # Base URL used to build per-provider callback URLs: {FORWARD_AUTH_BASE_URL}/_oauth/{provider}
      FORWARD_AUTH_BASE_URL: https://${BASE_DOMAIN}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      BASE_DOMAIN: ${BASE_DOMAIN}
      PORT: "4181"
    networks:
      - muvee-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.muvee-authservice.rule=Host(`${BASE_DOMAIN}`) && PathPrefix(`/_oauth`)"
      - "traefik.http.routers.muvee-authservice.entrypoints=websecure"
      - "traefik.http.routers.muvee-authservice.tls.certresolver=letsencrypt"
      - "traefik.http.routers.muvee-authservice.tls.domains[0].main=${BASE_DOMAIN}"
      - "traefik.http.services.muvee-authservice.loadbalancer.server.port=4181"

  traefik:
    image: traefik:v3.6.1
    command:
      - "--configFile=/etc/traefik/traefik.yml"
      - "--certificatesResolvers.letsencrypt.acme.email=${ACME_EMAIL}"
    depends_on:
      muvee-server:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - letsencrypt_data:/letsencrypt
      - traefik_logs:/var/log/traefik
    environment:
      ACME_EMAIL: ${ACME_EMAIL}
      BASE_DOMAIN: ${BASE_DOMAIN}
    networks:
      - muvee-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${BASE_DOMAIN}`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.tls.domains[0].main=traefik.${BASE_DOMAIN}"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=muvee-forward-auth-admin@file"

  # ── Builder agent — compiles Docker images and pushes to the registry ──────
  muvee-agent-builder:
    image: ghcr.io/hoveychen/muvee:latest
    command: ["agent"]
    restart: unless-stopped
    hostname: muvee-agent-builder
    environment:
      NODE_ROLE: builder
      CONTROL_PLANE_URL: http://muvee-server:8080
      AGENT_SECRET: ${AGENT_SECRET}
      NODE_NAME: muvee-agent-builder
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      muvee-server:
        condition: service_healthy
    networks:
      - muvee-net

  # ── Deploy agent — runs application containers and registers them with Traefik
  muvee-agent-deploy:
    image: ghcr.io/hoveychen/muvee:latest
    command: ["agent"]
    restart: unless-stopped
    hostname: muvee-agent-deploy
    environment:
      NODE_ROLE: deploy
      CONTROL_PLANE_URL: http://muvee-server:8080
      AGENT_SECRET: ${AGENT_SECRET}
      NODE_NAME: muvee-agent-deploy
      DATA_DIR: /muvee/data
      # HOST_IP is auto-detected (UDP probe toward muvee-server).
      # Override if Traefik cannot reach deployed containers:
      #   HOST_IP: "10.0.0.1"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - muvee_data:/muvee/data
      # Workspace volume: the agent creates per-project subdirectories here, then passes the
      # host path to `docker run -v`. Path must be identical inside the container and on the
      # host so that Docker resolves it correctly when launching deployed containers.
      - ${VOLUME_NFS_BASE_PATH:-/opt/muvee/volumes}:${VOLUME_NFS_BASE_PATH:-/opt/muvee/volumes}:rw
      # Dataset NFS base path: agent reads datasets from this location for rsync/deploy mounts.
      - ${DATASET_NFS_BASE_PATH:-/opt/muvee/datasets}:${DATASET_NFS_BASE_PATH:-/opt/muvee/datasets}:ro
    depends_on:
      muvee-server:
        condition: service_healthy
    networks:
      - muvee-net

volumes:
  postgres_data:
  registry_data:
  letsencrypt_data:
  muvee_data:
  traefik_logs:

networks:
  # Standalone mode: the network is created by this Compose file.
  # explicit `name` prevents Docker Compose from prepending the project prefix (muvee_muvee-net),
  # keeping it as `muvee-net` to match the Traefik provider config in traefik/traefik.yml.
  muvee-net:
    driver: bridge
    name: muvee-net
