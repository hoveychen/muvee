http:
  middlewares:
    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true

    # Any authenticated user (domain-restricted by ALLOWED_DOMAINS in authservice)
    muvee-forward-auth:
      forwardAuth:
        address: "http://muvee-authservice:4181/verify"
        authResponseHeaders:
          - "X-Forwarded-User"
          - "X-Forwarded-User-Name"
          - "X-Forwarded-User-Avatar"
          - "X-Forwarded-User-Provider"
        trustForwardHeader: true

    # Admin-only: only emails listed in ADMIN_EMAILS pass through
    muvee-forward-auth-admin:
      forwardAuth:
        address: "http://muvee-authservice:4181/verify-admin"
        authResponseHeaders:
          - "X-Forwarded-User"
          - "X-Forwarded-User-Name"
          - "X-Forwarded-User-Avatar"
          - "X-Forwarded-User-Provider"
        trustForwardHeader: true
